version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: shiftsync-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shiftsync
      POSTGRES_USER: shiftsync
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shiftsync_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftsync -d shiftsync"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: shiftsync-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://shiftsync:${DB_PASSWORD:-shiftsync_dev}@db:5432/shiftsync
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    volumes:
      - ./apps/server:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:dev"

  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    container_name: shiftsync-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/client:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
