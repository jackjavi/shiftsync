# ──────────────────────────────────────────────────────────────────────────────
# ShiftSync — shiftsync.boost-buddies.com
# ~/infrastructure/nginx/conf.d/shiftsync.boost-buddies.com.conf
#
# SETUP PROCEDURE:
#   1. Deploy this file with the HTTPS block REMOVED (HTTP-only first).
#   2. Start all stacks and verify HTTP routing works.
#   3. Issue SSL certificate:
#        cd ~/infrastructure
#        docker compose run --rm --entrypoint certbot certonly \
#          --webroot -w /var/www/certbot \
#          --email jackmtembete@gmail.com \
#          --agree-tos \
#          --no-eff-email \
#          -d shiftsync.boost-buddies.com
#   4. Add back the HTTPS server block below.
#   5. Reload nginx: docker exec infra-nginx nginx -s reload
# ──────────────────────────────────────────────────────────────────────────────

# ── HTTP: ACME challenge + redirect to HTTPS ──────────────────────────────────
server {
    listen 80;
    server_name shiftsync.boost-buddies.com;

    # Let's Encrypt webroot challenge (needed to issue and renew certs)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Once cert is issued, all HTTP traffic redirects to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: full production server ─────────────────────────────────────────────
# REMOVE THIS ENTIRE BLOCK before first deploy.
# Add it back after running the certbot command above.
server {
    listen 443 ssl;
    http2 on;
    server_name shiftsync.boost-buddies.com;

    # SSL certificates (paths match the -d flag in the certbot command above)
    ssl_certificate     /etc/letsencrypt/live/shiftsync.boost-buddies.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shiftsync.boost-buddies.com/privkey.pem;

    # Mozilla Intermediate TLS configuration
    ssl_session_timeout  1d;
    ssl_session_cache    shared:MozTLS:10m;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Allow larger payloads
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Socket.IO / WebSocket ── must be listed before /api/ ───────────────
    location /socket.io/ {
        proxy_pass         http://shiftsync-server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Long timeouts for persistent WebSocket connections
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 60s;
    }

    # ── REST API → NestJS server (container: shiftsync-server, port 3001) ──
    location /api/ {
        proxy_pass         http://shiftsync-server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Next.js static assets (long-lived browser cache) ───────────────────
    location /_next/static/ {
        proxy_pass http://shiftsync-client:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Next.js image optimisation ──────────────────────────────────────────
    location /_next/image {
        proxy_pass         http://shiftsync-client:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All other traffic → Next.js client (container: shiftsync-client, port 3000)
    location / {
        proxy_pass         http://shiftsync-client:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Deny dotfiles (.env, .git, .htaccess, etc.) ─────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
